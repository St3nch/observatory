[project]
name = "observatory-c2"
version = "0.0.0"
description = "Local-only C2 Controlled Public Manual Observation Package validation spine for The Observatory."
requires-python = ">=3.11"
dependencies = []

[tool.observatory]
status = "m13-dataforseo-campaign-fixture-only"
first_slice = "C2 Controlled Public Manual Observation Package"
probe = "DataForSEO one-shot fixture-only safety cage"
campaign = "M13 staged exploratory provider validation"
campaign_budget_usd = 50
network = "disabled"
provider_execution = "disabled"
provider_funding = "owner-reports-available"
providers = "candidate-catalog-only"
customer_data = "disabled"
postgres = "disabled"
schema_migrations = "disabled"
api_mcp = "disabled"
dashboard = "disabled"
strategy_storage = "disabled"

[tool.unittest]
test_command = "python -m unittest discover -s tests"
